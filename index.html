<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Cek Nilai TKA — Tes Kemampuan Akademik</title>
  <meta name="description"
    content="Cek nilai Tes Kemampuan Akademik (TKA) kamu berdasarkan NISN. Masukkan NISN dan lihat nilai Bahasa Indonesia & Matematika secara pribadi." />

  <!-- Favicon: emoji graduation cap -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background mid-blob decoration -->
  <div class="blob-mid" aria-hidden="true"></div>

  <!-- ========================================================
       MAIN APP WRAPPER
       ======================================================== -->
  <main class="app-wrapper" role="main">

    <!-- ---- HEADER ---- -->
    <header class="app-header">
      <div class="badge" aria-label="Label aplikasi">
        <!-- Icon sparkle -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/>
        </svg>
        Portal Nilai TKA
      </div>

      <h1>Cek Nilai TKA<br/>Kamu Sekarang</h1>
      <p>Masukkan NISN kamu untuk melihat hasil<br/>Tes Kemampuan Akademik secara pribadi.</p>
    </header>

    <!-- ---- SEARCH FORM CARD ---- -->
    <section class="card search-card" aria-label="Form pencarian nilai">

      <div class="card-icon" aria-hidden="true">
        <!-- Icon magnifying glass / search -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
        </svg>
      </div>

      <h2>Cari Data Nilai</h2>
      <p class="subtitle">Nilai hanya ditampilkan sesuai NISN yang kamu masukkan.</p>

      <form id="search-form" novalidate autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="nisn-input">
            NISN <span aria-hidden="true">*</span>
          </label>

          <div class="input-wrapper">
            <!-- Input icon -->
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z"/>
              </svg>
            </span>

            <input
              type="text"
              id="nisn-input"
              name="nisn"
              inputmode="numeric"
              maxlength="10"
              placeholder="Contoh: 1234567890"
              aria-required="true"
              aria-describedby="nisn-error"
              autocomplete="off"
            />
          </div>

          <!-- Error message untuk validasi -->
          <div id="nisn-error" class="error-msg" role="alert" aria-live="polite"></div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="search-btn" class="btn-primary" aria-label="Cek nilai berdasarkan NISN">
          <span id="btn-spinner" class="spinner hidden" aria-hidden="true"></span>
          <!-- Search icon (tampil saat tidak loading) -->
          <svg id="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
          </svg>
          <span id="btn-label">Cek Nilai</span>
        </button>
      </form>
    </section>

    <!-- ---- RESULT SECTION (hidden by default) ---- -->
    <section
      id="result-section"
      class="hidden"
      aria-label="Hasil nilai siswa"
      aria-live="polite"
    >
      <!-- Result card (data ditemukan) -->
      <div id="result-card" class="card result-card hidden">
        <!-- Diisi oleh JavaScript -->
      </div>

      <!-- Error card (data tidak ditemukan) -->
      <div id="error-card" class="card error-card hidden">
        <!-- Diisi oleh JavaScript -->
      </div>
    </section>

    <!-- ---- FOOTER ---- -->
    <footer class="app-footer">
      <p>🎓 Portal Nilai TKA &nbsp;·&nbsp; Data bersifat rahasia &amp; pribadi</p>
    </footer>

  </main>

  <!-- Scripts: data layer dulu, lalu app logic -->
  <script src="data/siswa.js"></script>
  <script src="app.js"></script>

</body>
</html>
